<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>渤化集团数字化经营分析会平台 - Prototype</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              panel: '#0f172a',
              panelSoft: '#111c31',
            },
            boxShadow: {
              glow: '0 0 40px rgba(34,211,238,0.12)',
            },
          },
        },
      };
    </script>
    <style>
      body { background: radial-gradient(circle at top, #0f1d35 0%, #020617 55%, #02040a 100%); }
      .card-hover { transition: transform .2s ease, border-color .2s ease, box-shadow .2s ease; }
      .card-hover:hover { transform: translateY(-4px); border-color: rgba(34,211,238,.55); box-shadow: 0 8px 24px rgba(8,145,178,.22); }
      .nav-active { border-color: rgba(34,211,238,.65) !important; background: rgba(34,211,238,.14) !important; color: #cffafe !important; }
    </style>
  </head>
  <body class="min-h-screen text-slate-100 p-6 md:p-8">
    <div class="mx-auto max-w-[1600px] space-y-6">
      <header class="rounded-3xl border border-cyan-900/60 bg-panel/90 px-6 py-5 shadow-glow backdrop-blur">
        <div class="flex flex-col gap-4 md:flex-row md:items-end md:justify-between">
          <div>
            <p class="text-cyan-300/90 text-sm tracking-[0.2em] uppercase">Bohua Group · Digital Operation</p>
            <h1 class="mt-2 text-3xl font-semibold tracking-wide">数字化经营分析会平台</h1>
            <p class="mt-2 text-slate-300">以经营为中心，以结果为导向</p>
          </div>
          <div class="grid grid-cols-2 gap-3 text-sm">
            <div class="rounded-2xl border border-slate-700 bg-slate-800/80 px-4 py-3">
              <p class="text-slate-400">当前会议周期</p>
              <p class="mt-1 text-cyan-200 font-medium">2026年4月经营分析会（第2周）</p>
            </div>
            <div class="rounded-2xl border border-slate-700 bg-slate-800/80 px-4 py-3">
              <p class="text-slate-400">会前准备完成度</p>
              <p class="mt-1 text-cyan-200 font-medium">91%</p>
            </div>
          </div>
        </div>
      </header>

      <div class="grid gap-6 lg:grid-cols-[240px_1fr_320px]">
        <aside class="space-y-4 rounded-3xl border border-slate-800 bg-panel/80 p-4">
          <p class="px-2 text-xs uppercase tracking-[0.25em] text-slate-400">导航</p>
          <nav id="nav" class="space-y-2"></nav>

          <div class="rounded-2xl border border-cyan-800/40 bg-slate-800/60 p-4">
            <p class="text-sm text-slate-300">预警摘要</p>
            <p class="mt-2 text-2xl font-semibold text-cyan-200">3 条</p>
            <p class="mt-1 text-xs text-slate-400">红色预警 1 条，黄色预警 2 条</p>
          </div>
        </aside>

        <main class="space-y-6">
          <section id="kpi" class="grid gap-4 md:grid-cols-2 xl:grid-cols-4"></section>

          <section class="rounded-3xl border border-slate-800 bg-panel/80 p-5">
            <h2 class="text-lg font-medium">会议全生命周期</h2>
            <div id="lifecycle" class="mt-4 grid gap-4 xl:grid-cols-3"></div>
          </section>

          <section class="rounded-3xl border border-slate-800 bg-panel/80 p-5">
            <h2 class="text-lg font-medium">会中专题分析</h2>
            <div id="topics" class="mt-4 grid gap-4 md:grid-cols-2 xl:grid-cols-5"></div>
          </section>

          <section class="rounded-3xl border border-slate-800 bg-panel/80 p-5">
            <div class="flex items-center justify-between">
              <h2 class="text-lg font-medium">会后督办事项</h2>
              <button class="card-hover rounded-xl border border-cyan-700/60 bg-cyan-600/10 px-3 py-1.5 text-sm text-cyan-200">
                新建督办
              </button>
            </div>
            <div class="mt-4 overflow-x-auto">
              <table class="min-w-full text-sm">
                <thead>
                  <tr class="border-b border-slate-700 text-slate-400">
                    <th class="px-3 py-3 text-left font-medium">事项名称</th>
                    <th class="px-3 py-3 text-left font-medium">责任部门</th>
                    <th class="px-3 py-3 text-left font-medium">截止日期</th>
                    <th class="px-3 py-3 text-left font-medium">当前状态</th>
                  </tr>
                </thead>
                <tbody id="supervision"></tbody>
              </table>
            </div>
          </section>
        </main>

        <aside class="space-y-6">
          <section class="rounded-3xl border border-slate-800 bg-panel/80 p-5">
            <h2 class="text-lg font-medium">异常预警</h2>
            <div id="warnings" class="mt-4 space-y-3"></div>
          </section>

          <section class="rounded-3xl border border-slate-800 bg-panel/80 p-5">
            <h2 class="text-lg font-medium">建设主线</h2>
            <div id="roadmap" class="mt-4 space-y-3"></div>
          </section>
        </aside>
      </div>
    </div>

    <script>
      const navItems = ['首页总览', '会前准备', '会中汇报', '会后总结', '资料中心', '系统管理'];
      const kpiCards = [
        { name: '营业收入', value: '¥ 428.6 亿', hint: '同比 +6.8%' },
        { name: '利润总额', value: '¥ 37.2 亿', hint: '完成率 92.4%' },
        { name: '营业收现率', value: '89.7%', hint: '较上月 +1.9pct' },
        { name: '督办事项闭环率', value: '84.3%', hint: '本期提升 7 项' },
      ];
      const lifecycleCards = [
        { title: '会前准备', points: ['数据采集任务', '异常指标预警', '专项材料上传', '定版数据查询'] },
        { title: '会中呈现', points: ['经营总览驾驶舱', '专题汇报', '层层穿透', '在线纪要'] },
        { title: '会后总结', points: ['纪要留痕', '督办追踪', '资料中心', '闭环复盘'] },
      ];
      const topics = ['经济运行分析', '生产运行分析', '采购销售分析', '人工成本分析', '重点专项与督办'];
      const warnings = [
        { name: '主营收入完成率预警', level: '红', desc: '华北板块完成率低于序时进度 4.2pct。' },
        { name: '营业收现率预警', level: '黄', desc: '氯碱板块回款节奏偏慢，需重点跟踪。' },
        { name: '销售费用压降预警', level: '黄', desc: '二级企业费用管控波动超阈值。' },
      ];
      const constructionRoadmap = [
        { step: '统一接入', desc: '统一采集集团及板块核心经营数据，确保口径一致。' },
        { step: '统一建模', desc: '围绕经营分析会场景沉淀指标体系与分析模型。' },
        { step: '统一分析', desc: '形成集团→板块→企业→装置/客户的穿透链路。' },
        { step: '统一行动', desc: '以督办闭环为抓手，推动问题整改与结果复盘。' },
      ];
      const supervisionRows = [
        { item: '重点产品毛利修复方案', owner: '采购销售部', due: '2026-04-18', status: '推进中' },
        { item: '装置能耗异常专项排查', owner: '生产技术部', due: '2026-04-20', status: '待启动' },
        { item: '应收账款压降行动复盘', owner: '财务管理部', due: '2026-04-15', status: '已完成' },
        { item: '重点客户结构优化清单', owner: '企管法务部', due: '2026-04-22', status: '推进中' },
      ];

      function renderNav() {
        const nav = document.getElementById('nav');
        nav.innerHTML = navItems
          .map((item, idx) => `
            <button data-item="${item}" class="nav-item w-full rounded-2xl border px-3 py-2 text-left text-sm card-hover ${idx === 0 ? 'nav-active' : 'border-slate-700 bg-slate-800/40 text-slate-300'}">
              ${item}
            </button>
          `)
          .join('');

        nav.querySelectorAll('.nav-item').forEach((btn) => {
          btn.addEventListener('click', () => {
            nav.querySelectorAll('.nav-item').forEach((x) => {
              x.classList.remove('nav-active');
              x.classList.add('border-slate-700', 'bg-slate-800/40', 'text-slate-300');
            });
            btn.classList.add('nav-active');
            btn.classList.remove('border-slate-700', 'bg-slate-800/40', 'text-slate-300');
          });
        });
      }

      document.getElementById('kpi').innerHTML = kpiCards
        .map(
          (card) => `
            <article class="card-hover rounded-3xl border border-slate-800 bg-panel/80 p-5">
              <p class="text-sm text-slate-400">${card.name}</p>
              <p class="mt-3 text-2xl font-semibold text-cyan-100">${card.value}</p>
              <p class="mt-2 text-sm text-cyan-300/80">${card.hint}</p>
            </article>
          `
        )
        .join('');

      document.getElementById('lifecycle').innerHTML = lifecycleCards
        .map(
          (card) => `
            <article class="card-hover rounded-2xl border border-slate-700 bg-slate-800/50 p-4">
              <h3 class="text-cyan-200 font-medium">${card.title}</h3>
              <ul class="mt-3 space-y-2 text-sm text-slate-300">
                ${card.points.map((point) => `<li class="flex items-center gap-2"><span class="h-1.5 w-1.5 rounded-full bg-cyan-400"></span>${point}</li>`).join('')}
              </ul>
            </article>
          `
        )
        .join('');

      document.getElementById('topics').innerHTML = topics
        .map(
          (topic) => `
            <article class="card-hover rounded-2xl border border-slate-700 bg-slate-800/50 p-4">
              <h3 class="font-medium text-cyan-100">${topic}</h3>
              <p class="mt-2 text-xs text-slate-400 leading-relaxed">支持集团→板块→二级企业→产品/客户/装置等维度穿透分析</p>
            </article>
          `
        )
        .join('');

      document.getElementById('warnings').innerHTML = warnings
        .map(
          (w) => `
            <article class="rounded-2xl border border-slate-700 bg-slate-800/60 p-3 card-hover">
              <div class="flex items-start justify-between gap-2">
                <h3 class="text-sm font-medium text-slate-100">${w.name}</h3>
                <span class="rounded-full border px-2 py-0.5 text-xs ${w.level === '红' ? 'bg-red-500/20 text-red-300 border-red-400/40' : 'bg-amber-500/20 text-amber-300 border-amber-400/40'}">${w.level}级</span>
              </div>
              <p class="mt-2 text-xs leading-relaxed text-slate-400">${w.desc}</p>
            </article>
          `
        )
        .join('');

      document.getElementById('roadmap').innerHTML = constructionRoadmap
        .map(
          (item, idx) => `
            <article class="rounded-2xl border border-slate-700 bg-slate-800/50 p-3 card-hover">
              <p class="text-cyan-200 text-sm font-medium">${idx + 1}. ${item.step}</p>
              <p class="mt-1 text-xs text-slate-400 leading-relaxed">${item.desc}</p>
            </article>
          `
        )
        .join('');

      document.getElementById('supervision').innerHTML = supervisionRows
        .map(
          (row) => `
            <tr class="border-b border-slate-800/70 text-slate-200">
              <td class="px-3 py-3">${row.item}</td>
              <td class="px-3 py-3">${row.owner}</td>
              <td class="px-3 py-3">${row.due}</td>
              <td class="px-3 py-3">${row.status}</td>
            </tr>
          `
        )
        .join('');

      renderNav();
    </script>
  </body>
</html>
